id: backfill_pipeline
namespace: hk_data_pipeline

inputs:
  - id: start_date
    type: STRING
    defaults: "2024-01-01"
  - id: end_date
    type: STRING
    defaults: "2024-01-31"

tasks:
  - id: dbt_backfill
    type: io.kestra.plugin.dbt.cli.DbtCLI
    docker:
      image: ghcr.io/dbt-labs/dbt-bigquery:1.7.0
    commands:
      - >
        dbt run
        --project-dir /app/dbt
        --profiles-dir /app/dbt
        --vars '{"start_date": "{{ inputs.start_date }}", "end_date": "{{ inputs.end_date }}"}'
        --full-refresh
