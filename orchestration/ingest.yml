id: ingest
namespace: hk_data_pipeline
description: "Shared ingestion subflow: fetch data from Open-Meteo API to GCS"

inputs:
  - id: start_date
    type: STRING
  - id: end_date
    type: STRING
  - id: source
    type: STRING
    description: "Python script name without .py (e.g. weather_report, air_quality)"

variables:
  python_image: asia-east2-docker.pkg.dev/kestra-sandbox-486905/hk-pipeline/ingestion:latest

tasks:
  - id: ingest
    type: io.kestra.plugin.scripts.python.Commands
    docker:
      image: "{{ vars.python_image }}"
    commands:
      - python /app/{{ inputs.source }}.py --start-date {{ inputs.start_date }} --end-date {{ inputs.end_date }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ kv('GCP_SERVICE_ACCOUNT_KEY') }}"
