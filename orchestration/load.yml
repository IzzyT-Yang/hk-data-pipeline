id: load
namespace: hk_data_pipeline
description: "Shared load subflow: GCS → BigQuery"

inputs:
  - id: start_date
    type: STRING
  - id: end_date
    type: STRING
  - id: source
    type: STRING
    description: "Source name for gcs_to_bq.py --source flag (weather, air_quality, or all)"

variables:
  python_image: asia-east2-docker.pkg.dev/kestra-sandbox-486905/hk-pipeline/ingestion:latest

tasks:
  - id: load
    type: io.kestra.plugin.scripts.python.Commands
    docker:
      image: "{{ vars.python_image }}"
    commands:
      - python /app/gcs_to_bq.py --source {{ inputs.source }} --start-date {{ inputs.start_date }} --end-date {{ inputs.end_date }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ kv('GCP_SERVICE_ACCOUNT_KEY') }}"
