id: daily_pipeline
namespace: hk_data_pipeline
description: "ETL pipeline: ingest → load (parallel per source) → dbt transform. Runs daily or on-demand for backfill."

inputs:
  - id: start_date
    type: STRING
    defaults: "{{ now() | date('yyyy-MM-dd') }}"
    description: "Start date (YYYY-MM-DD), defaults to today"
  - id: end_date
    type: STRING
    defaults: "{{ now() | date('yyyy-MM-dd') }}"
    description: "End date (YYYY-MM-DD), defaults to today"
  - id: run_ingest
    type: BOOLEAN
    defaults: true
    description: "Run ingestion step (Open-Meteo → GCS)"
  - id: run_load
    type: BOOLEAN
    defaults: true
    description: "Run load step (GCS → BigQuery)"
  - id: run_transform
    type: BOOLEAN
    defaults: true
    description: "Run dbt transform step"

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"

tasks:
  - id: ingest
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.run_ingest }}"
    then:
      - id: ingest_parallel
        type: io.kestra.plugin.core.flow.Parallel
        tasks:
          - id: ingest_weather
            type: io.kestra.plugin.core.flow.Subflow
            flowId: ingest
            namespace: hk_data_pipeline
            inputs:
              start_date: "{{ inputs.start_date }}"
              end_date: "{{ inputs.end_date }}"
              source: weather_report

          - id: ingest_air_quality
            type: io.kestra.plugin.core.flow.Subflow
            flowId: ingest
            namespace: hk_data_pipeline
            inputs:
              start_date: "{{ inputs.start_date }}"
              end_date: "{{ inputs.end_date }}"
              source: air_quality

  - id: load
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.run_load }}"
    then:
      - id: load_parallel
        type: io.kestra.plugin.core.flow.Parallel
        tasks:
          - id: load_weather
            type: io.kestra.plugin.core.flow.Subflow
            flowId: load
            namespace: hk_data_pipeline
            inputs:
              start_date: "{{ inputs.start_date }}"
              end_date: "{{ inputs.end_date }}"
              source: weather

          - id: load_air_quality
            type: io.kestra.plugin.core.flow.Subflow
            flowId: load
            namespace: hk_data_pipeline
            inputs:
              start_date: "{{ inputs.start_date }}"
              end_date: "{{ inputs.end_date }}"
              source: air_quality

  - id: transform
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.run_transform }}"
    then:
      - id: dbt_transform
        type: io.kestra.plugin.core.flow.Subflow
        flowId: transform
        namespace: hk_data_pipeline
        inputs:
          start_date: "{{ inputs.start_date }}"
          end_date: "{{ inputs.end_date }}"
