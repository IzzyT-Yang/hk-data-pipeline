id: transform
namespace: hk_data_pipeline
description: "Shared transform subflow: dbt staging dedup + mart aggregation"

inputs:
  - id: start_date
    type: STRING
  - id: end_date
    type: STRING

variables:
  dbt_image: asia-east2-docker.pkg.dev/kestra-sandbox-486905/hk-pipeline/dbt:latest

tasks:
  - id: dbt_run
    type: io.kestra.plugin.scripts.python.Commands
    docker:
      image: "{{ vars.dbt_image }}"
    commands:
      - python3 -c "import os; open('/tmp/keyfile.json','w').write(os.environ['GOOGLE_APPLICATION_CREDENTIALS_JSON'])"
      - >
        dbt run
        --project-dir /app/dbt
        --profiles-dir /app/dbt
        --vars '{"start_date": "{{ inputs.start_date }}", "end_date": "{{ inputs.end_date }}"}'
    env:
      GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ kv('GCP_SERVICE_ACCOUNT_KEY') }}"
